<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>jQuery Chat UI Prototype</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="app">

  <!-- LEFT PANEL -->
  <div class="sidebar">
    <h3>Chats</h3>

    <div class="contact active" data-chat="chat1">Alice</div>
    <div class="contact" data-chat="chat2">Bob</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="chat-section">

    <div class="chat-header" id="chatHeader">Alice</div>

    <!-- Chat Windows -->
    <div class="chat-box" id="chat1"></div>
    <div class="chat-box hidden" id="chat2"></div>

    <!-- Typing Indicator -->
    <div class="typing" id="typing">Typing...</div>

    <!-- Input -->
    <div class="input-area">
      <input type="text" id="message" placeholder="Type a message">
      <button id="sendBtn">Send</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
